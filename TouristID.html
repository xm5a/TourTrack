<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tourist IDs - Safety Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --sidebar-bg: #111827;
            --sidebar-hover: #1f2937;
            --accent-blue: #3b82f6;
            --bg-body: #f3f4f6;
            --glass-white: rgba(255, 255, 255, 0.98);
            --border-color: #e5e7eb;
            --sidebar-width: 260px;
            --safety-high: #16a34a; --safety-high-bg: #f0fdf4;
            --safety-low: #dc2626; --safety-low-bg: #fef2f2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* Firefox-Perfect Grid Layout */
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- SHARED SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            color: white;
            position: fixed;
            height: 100vh;
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 2.5rem 1.5rem;
            font-weight: 700;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-nav { list-style: none; margin-top: 0.5rem; }
        .sidebar-nav a {
            display: flex;
            align-items: center;
            padding: 14px 24px;
            color: #9ca3af;
            text-decoration: none;
            margin: 4px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .sidebar-nav a:hover, .sidebar-nav a.active {
            color: #fff;
            background-color: var(--sidebar-hover);
        }

        .sidebar-nav a.active {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.1) 0%, rgba(31, 41, 55, 1) 100%);
            box-shadow: inset 4px 0 0 var(--accent-blue);
        }

        /* --- MAIN CONTENT --- */
        .main-content {
            grid-column: 2;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .header {
            background: var(--glass-white);
            backdrop-filter: blur(12px);
            padding: 1.2rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 900;
        }

        .content-container {
            padding: 2.5rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .search-bar {
            display: flex;
            align-items: center;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 16px;
            width: 350px;
        }

        .search-bar input {
            border: none;
            outline: none;
            margin-left: 10px;
            width: 100%;
            font-size: 0.9rem;
        }

        /* --- TABLE CARD --- */
        .card {
            background: white;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.04);
            overflow: hidden;
        }

        .tourist-table { width: 100%; border-collapse: collapse; }
        .tourist-table th {
            background-color: #f9fafb;
            padding: 1rem 1.5rem;
            text-align: left;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #6b7280;
            border-bottom: 1px solid var(--border-color);
        }

        .tourist-table td {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
            color: #374151;
        }

        /* --- BADGES & ACTIONS --- */
        .badge {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .badge-active { background: var(--safety-high-bg); color: var(--safety-high); }
        .badge-sos { background: var(--safety-low-bg); color: var(--safety-low); }

        .action-buttons { display: flex; gap: 8px; }
        .action-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: white;
            cursor: pointer;
            transition: 0.2s;
            color: #4b5563;
        }
        .action-btn:hover { background: #f3f4f6; color: var(--accent-blue); }
        .btn-delete:hover { background: #fee2e2; color: #dc2626; border-color: #fecaca; }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center; align-items: center;
            z-index: 2000;
        }
        .modal-panel {
            background: white;
            border-radius: 16px;
            width: 450px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .modal-header {
            padding: 1.5rem;
            background: #f9fafb;
            border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-body { padding: 1.5rem; }
        .detail-row {
            display: flex; justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f3f4f6;
        }
        .detail-label { font-weight: 600; color: #6b7280; }
        .close-modal {
            background: var(--accent-blue);
            color: white; border: none; padding: 10px; width: 100%;
            border-radius: 8px; cursor: pointer; margin-top: 15px; font-weight: 600;
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header">
            <i class="fa-solid fa-shield-halved" style="color: var(--accent-blue);"></i>
            <span>Safety Hub</span>
        </div>
        <ul class="sidebar-nav">
            <li><a href="homepage.html"><i class="fa-solid fa-house"></i> Dashboard</a></li>
            <li><a href="Alert History.html"><i class="fa-solid fa-bullhorn"></i> Alert History</a></li>
            <li><a href="TouristID.html" class="active"><i class="fa-solid fa-id-card"></i> Tourist IDs</a></li>
            <li><a href="ZoneManagement.html"><i class="fa-solid fa-map-location-dot"></i> Zone Management</a></li>
            <li><a href="Reports.html"><i class="fa-solid fa-chart-line"></i> Reports</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <header class="header">
            <h1>Tourist Management</h1>
            <div style="display:flex; align-items:center; gap:15px;">
                <span>Welcome, <strong>Admin</strong></span>
                <i class="fa-solid fa-circle-user" style="font-size: 1.6rem; color: #4b5563;"></i>
            </div>
        </header>
        
        <div class="content-container">
            <div class="page-header">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass" style="color:#9ca3af;"></i>
                    <input type="text" id="search-input" placeholder="Search by ID or Name..." onkeyup="filterTable()">
                </div>
            </div>

            <div class="card">
                <table class="tourist-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Coordinates</th>
                            <th>Status</th>
                            <th>Last Seen</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr><td colspan="6" style="text-align:center; padding:3rem; color:#6b7280;">
                            <i class="fa-solid fa-spinner fa-spin"></i> Accessing database...
                        </td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="details-modal" class="modal-overlay">
        <div class="modal-panel">
            <div class="modal-header">
                <h2 style="font-size:1.1rem;">Tourist Profile</h2>
                <i class="fa-solid fa-xmark" onclick="closeModal()" style="cursor:pointer; color:#9ca3af;"></i>
            </div>
            <div class="modal-body" id="modal-content"></div>
        </div>
    </div>

<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBzgUTcdlt3DOQvnNsv4f_05sxJt0DUsYg",
            authDomain: "tour-track-ddb18.firebaseapp.com",
            projectId: "tour-track-ddb18",
            storageBucket: "tour-track-ddb18.firebasestorage.app",
            messagingSenderId: "426865781508",
            appId: "1:426865781508:web:8fb7a409f00c536955be51"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tableBody = document.getElementById("table-body");

        // Keep a cache of locations to update the table smoothly
        const locationCache = {};

        // 1. Listen for LIVE location changes separately
        onSnapshot(collection(db, "user_locations"), (locSnapshot) => {
            locSnapshot.forEach(doc => {
                const locData = doc.data();
                locationCache[doc.id] = {
                    lat: locData.latitude || locData.lat || 0,
                    lng: locData.longitude || locData.lng || 0
                };
                
                // Update specific cell if the row already exists in the table
                const coordCell = document.querySelector(`#row-${doc.id} .coord-cell`);
                if (coordCell) {
                    coordCell.innerText = `${locationCache[doc.id].lat.toFixed(4)}, ${locationCache[doc.id].lng.toFixed(4)}`;
                }
            });
        });

        // 2. Main Users Listener
        onSnapshot(collection(db, "users"), (snapshot) => {
            if (snapshot.empty) {
                tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:2rem;">No tourist data available.</td></tr>';
                return;
            }

            tableBody.innerHTML = '';
            snapshot.forEach((doc) => {
                const data = doc.data();
                const id = doc.id;
                const tr = document.createElement("tr");
                tr.id = `row-${id}`;
                
                const isSOS = data.sos === true || String(data.sos).toLowerCase() === "true";
                const badgeClass = isSOS ? "badge-sos" : "badge-active";
                const statusIcon = isSOS ? "fa-triangle-exclamation" : "fa-circle-check";
                const statusText = isSOS ? "SOS ALERT" : "ACTIVE";

                // Pull from cache or use 0.000 if not yet loaded
                const coords = locationCache[id] || { lat: 0, lng: 0 };
                const coordDisplay = (coords.lat === 0 && coords.lng === 0) ? "No Active Tour" : `${coords.lat.toFixed(4)}, ${coords.lng.toFixed(4)}`;

                tr.innerHTML = `
                    <td style="font-family:monospace; font-weight:bold; color:var(--accent-blue)">${id.substring(0,8)}</td>
                    <td><strong>${data.fullName || "N/A"}</strong></td>
                    <td class="coord-cell" style="color:#6b7280">${coordDisplay}</td>
                    <td><span class="badge ${badgeClass}"><i class="fa-solid ${statusIcon}"></i> ${statusText}</span></td>
                    <td>${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</td>
                    <td class="action-buttons">
                        <button class="action-btn" onclick="showDetails('${id}')"><i class="fa-solid fa-eye"></i></button>
                        <button class="action-btn btn-delete" onclick="deleteTourist('${id}')"><i class="fa-solid fa-trash"></i></button>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
        });

        // Global Actions
        window.deleteTourist = async function(id) {
            if(confirm("Confirm deletion of this tourist record? This cannot be undone.")) {
                try {
                    await deleteDoc(doc(db, "users", id));
                    // Also cleanup location record if it exists
                    await deleteDoc(doc(db, "user_locations", id));
                } catch(e) { alert("Error: " + e.message); }
            }
        };

        window.showDetails = function(id) {
            const tr = document.getElementById(`row-${id}`);
            if(!tr) return;
            const cols = tr.querySelectorAll('td');
            
            const html = `
                <div class="detail-row"><span class="detail-label">Full ID:</span> <span>${id}</span></div>
                <div class="detail-row"><span class="detail-label">Name:</span> <span>${cols[1].innerText}</span></div>
                <div class="detail-row"><span class="detail-label">Live Location:</span> <span>${cols[2].innerText}</span></div>
                <div class="detail-row"><span class="detail-label">Status:</span> <span>${cols[3].innerText}</span></div>
                <button class="close-modal" onclick="closeModal()">Close Profile</button>
            `;
            document.getElementById('modal-content').innerHTML = html;
            document.getElementById('details-modal').style.display = 'flex';
        };

        window.closeModal = () => document.getElementById('details-modal').style.display = 'none';

        window.filterTable = function() {
            const filter = document.getElementById('search-input').value.toUpperCase();
            const trs = tableBody.getElementsByTagName('tr');
            for (let tr of trs) {
                const text = tr.textContent || tr.innerText;
                tr.style.display = text.toUpperCase().includes(filter) ? "" : "none";
            }
        };
    </script>
</body>
</html>
