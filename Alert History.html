<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alert History - Safety Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --sidebar-bg: #111827;
            --sidebar-hover: #1f2937;
            --accent-blue: #3b82f6;
            --bg-body: #f3f4f6;
            --glass-white: rgba(255, 255, 255, 0.9);
            --border-color: #e5e7eb;
            --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- SIDEBAR WITH GLOW EFFECTS --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            color: white;
            position: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 2.5rem 1.5rem;
            font-weight: 700;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-nav { list-style: none; margin-top: 0.5rem; }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            padding: 14px 24px;
            color: #9ca3af;
            text-decoration: none;
            transition: all 0.2s ease-in-out;
            margin: 4px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Blue Glow + Gradient from your screenshot */
        .sidebar-nav a:hover, .sidebar-nav a.active {
            color: #fff;
            background-color: var(--sidebar-hover);
        }

        .sidebar-nav a.active {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.15) 0%, rgba(31, 41, 55, 1) 100%);
            box-shadow: inset 4px 0 0 var(--accent-blue);
        }

        .sidebar-nav i { width: 28px; font-size: 1.1rem; }

        /* --- MAIN LAYOUT FIX --- */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            width: calc(100% - var(--sidebar-width));
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--glass-white);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px); /* Safari Support */
            padding: 1.2rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 900;
        }

        .header h1 { font-size: 1.4rem; font-weight: 600; color: #111827; }

        /* Container that prevents the "Stretched" look */
        .content-container {
            padding: 2.5rem;
            max-width: 1600px; 
            width: 100%;
            margin: 0 auto;
        }

        /* --- TABLE & CARD --- */
        .card {
            background: white;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 15px -3px rgba(0, 0, 0, 0.04);
            overflow: hidden;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
        }

        .history-table th {
            background-color: #f9fafb;
            padding: 1rem 1.5rem;
            text-align: left;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #6b7280;
            border-bottom: 1px solid var(--border-color);
        }

        .history-table td {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
            color: #374151;
        }

        /* Badge Styling from screenshot */
        .badge-sos {
            background: #fee2e2;
            color: #dc2626;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.7rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .track-btn {
            background: var(--accent-blue);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: transform 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .track-btn:hover { background: #2563eb; transform: translateY(-1px); }

        .user-profile { display: flex; align-items: center; gap: 12px; font-size: 0.9rem; }
        .user-profile i { font-size: 1.6rem; color: #4b5563; }

    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-header">
            <i class="fa-solid fa-shield-halved" style="color: var(--accent-blue);"></i>
            <span>Safety Hub</span>
        </div>
        <ul class="sidebar-nav">
            <li><a href="homepage.html"><i class="fa-solid fa-house"></i> Dashboard</a></li>
            <li><a href="#" class="active"><i class="fa-solid fa-bullhorn"></i> Alert History</a></li>
            <li><a href="TouristID.html"><i class="fa-solid fa-id-card"></i> Tourist IDs</a></li>
            <li><a href="ZoneManagement.html"><i class="fa-solid fa-map-location-dot"></i> Zone Management</a></li>
            <li><a href="Reports.html"><i class="fa-solid fa-chart-simple"></i> Reports</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <header class="header">
            <h1>Alert History</h1>
            <div class="user-profile">
                <span>Welcome, <strong>Admin</strong></span>
                <i class="fa-solid fa-circle-user"></i>
            </div>
        </header>
        
        <div class="content-container">
            <div class="card">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Alert Type</th>
                            <th>User Name</th>
                            <th>Contact</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td>05 Mar, 07:32 pm</td>
                            <td><span class="badge-sos"><i class="fa-solid fa-triangle-exclamation"></i> SOS - EMERGENCY</span></td>
                            <td><strong>PAPPU</strong></td>
                            <td>1234567890</td>
                            <td style="color: #dc2626; font-weight: 700;">Active</td>
                            <td><a href="#" class="track-btn"><i class="fa-solid fa-location-crosshairs"></i> Locate</a></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    </body>
</html>
