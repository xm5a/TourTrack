<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zone Management - Safety Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet">
    <link href="https://js.radar.com/v4.5.3/radar.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.3/mapbox-gl-draw.css" type="text/css" />

    <style>
        :root {
            --sidebar-bg: #111827;
            --sidebar-hover: #1f2937;
            --accent-blue: #3b82f6;
            --bg-body: #f3f4f6;
            --glass-white: rgba(255, 255, 255, 0.98);
            --border-color: #e5e7eb;
            --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* Firefox-Perfect Grid Layout */
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr;
            min-height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* --- SHARED SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            color: white;
            position: fixed;
            height: 100vh;
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 2.5rem 1.5rem;
            font-weight: 700;
            font-size: 1.25rem;
            display: flex; align-items: center; gap: 12px;
        }

        .sidebar-nav { list-style: none; margin-top: 0.5rem; }
        .sidebar-nav a {
            display: flex; align-items: center; padding: 14px 24px;
            color: #9ca3af; text-decoration: none; margin: 4px 16px;
            border-radius: 8px; font-size: 0.9rem; transition: 0.2s;
        }

        .sidebar-nav a:hover, .sidebar-nav a.active {
            color: #fff; background-color: var(--sidebar-hover);
        }

        .sidebar-nav a.active {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.1) 0%, rgba(31, 41, 55, 1) 100%);
            box-shadow: inset 4px 0 0 var(--accent-blue);
        }

        /* --- MAIN CONTENT --- */
        .main-content {
            grid-column: 2;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            background: var(--glass-white);
            backdrop-filter: blur(12px);
            padding: 1.2rem 2.5rem;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-color);
            z-index: 900;
        }

        /* --- ZONE LAYOUT --- */
        .zone-container {
            display: grid;
            grid-template-columns: 1fr 400px;
            flex-grow: 1;
            overflow: hidden;
        }

        #map-overlay { width: 100%; height: 100%; background: #e2e8f0; }

        .management-panel {
            background: white;
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            box-shadow: -4px 0 15px rgba(0,0,0,0.03);
        }

        .panel-header { padding: 1.5rem; border-bottom: 1px solid var(--border-color); }
        .panel-header h2 { font-size: 1.1rem; margin-bottom: 0.5rem; }
        .panel-header p { font-size: 0.85rem; color: #6b7280; margin-bottom: 1.5rem; }

        .btn-primary {
            background: var(--accent-blue);
            color: white; border: none; padding: 12px;
            border-radius: 8px; width: 100%; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        .zone-list { flex-grow: 1; overflow-y: auto; list-style: none; }
        .zone-item {
            padding: 1.25rem; border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
        }
        .zone-item h3 { font-size: 0.95rem; margin-bottom: 4px; }
        .zone-loc { font-size: 0.8rem; color: #6b7280; display: block; margin-bottom: 8px; }

        /* Badges */
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .badge-prohibited { background: #fee2e2; color: #dc2626; }
        .badge-high { background: #ffedd5; color: #ea580c; }
        .badge-restricted { background: #fef9c3; color: #a16207; }

        .del-btn {
            background: #fff; border: 1px solid #fee2e2; color: #dc2626;
            width: 32px; height: 32px; border-radius: 6px; cursor: pointer;
        }
        .del-btn:hover { background: #dc2626; color: white; }

        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(17, 24, 39, 0.6); backdrop-filter: blur(4px);
            display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .modal-panel { background: white; width: 450px; border-radius: 12px; padding: 2rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; }
        .form-group input, .form-group select {
            width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px;
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-header">
            <i class="fa-solid fa-shield-halved" style="color: var(--accent-blue);"></i>
            <span>Safety Hub</span>
        </div>
        <ul class="sidebar-nav">
            <li><a href="homepage.html"><i class="fa-solid fa-house"></i> Dashboard</a></li>
            <li><a href="Alert History.html"><i class="fa-solid fa-bullhorn"></i> Alert History</a></li>
            <li><a href="TouristID.html"><i class="fa-solid fa-id-card"></i> Tourist IDs</a></li>
            <li><a href="ZoneManagement.html" class="active"><i class="fa-solid fa-map-location-dot"></i> Zone Management</a></li>
            <li><a href="Reports.html"><i class="fa-solid fa-chart-line"></i> Reports</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <header class="header">
            <h1>Zone Management</h1>
            <div class="user-profile">
                <span>Welcome, <strong>Admin</strong></span>
                <i class="fa-solid fa-circle-user" style="font-size: 1.6rem; margin-left:10px; color:#4b5563;"></i>
            </div>
        </header>
        
        <div class="zone-container">
            <div id="map-overlay"></div>
            
            <aside class="management-panel">
                <div class="panel-header">
                    <h2>Manage Safety Zones</h2>
                    <p>Draw boundaries on the map to define geofenced risk areas.</p>
                    <button class="btn-primary" onclick="openModal()"><i class="fa-solid fa-plus"></i> Create New Zone</button>
                </div>
                <ul class="zone-list" id="zone-list">
                    <li style="text-align:center; padding: 2rem; color: #6b7280;"><i class="fa-solid fa-spinner fa-spin"></i> Loading zones...</li>
                </ul>
            </aside>
        </div>
    </main>

    <div id="zone-modal" class="modal-overlay">
        <div class="modal-panel">
            <h2 style="margin-bottom: 1.5rem;">Configure Zone</h2>
            <div class="form-group">
                <label>Zone Name</label>
                <input type="text" id="zone-name" placeholder="e.g. Cliff Warning Area">
            </div>
            <div class="form-group">
                <label>District / Place</label>
                <input type="text" id="zone-place" placeholder="e.g. Thane, Yeoor">
            </div>
            <div class="form-group">
                <label>Risk Level</label>
                <select id="zone-risk">
                    <option value="restricted">Restricted (Yellow)</option>
                    <option value="high">High Risk (Orange)</option>
                    <option value="prohibited">Prohibited (Red)</option>
                </select>
            </div>
            <div style="display:flex; gap:10px; margin-top:2rem;">
                <button class="btn-primary" onclick="startDrawing()">Save & Start Drawing</button>
                <button onclick="closeModal()" style="background:none; border:none; cursor:pointer; color:#6b7280; font-weight:600;">Cancel</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script src="https://js.radar.com/v4.5.3/radar.min.js"></script>
    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.3/mapbox-gl-draw.js"></script>

    <script>
        const RADAR_PK = 'prj_live_pk_ed91d1d636ae3f3366727a2c648ba6a976e29d40';
        const RADAR_SK = 'prj_live_sk_2f8e1e138dd5fcf9dbb5c3537ffb75b93c083021';
        
        Radar.initialize(RADAR_PK);

        const map = Radar.ui.map({
            container: 'map-overlay',
            style: 'radar-default-v1',
            center: [72.978088, 19.218331],
            zoom: 13,
        });

        const draw = new MapboxDraw({
            displayControlsDefault: false,
            controls: { polygon: true, trash: true }
        });
        map.addControl(draw);

        // --- FETCH FIX ---
        async function loadZones() {
            try {
                // Fix: Ensure standard fetch with Authorization header works for Radar
                const response = await fetch('https://api.radar.io/v1/geofences?tag=safety-zone&limit=100', {
                    headers: { 'Authorization': RADAR_SK }
                });
                const data = await response.json();
                const fences = data.geofences || [];
                
                const list = document.getElementById('zone-list');
                list.innerHTML = '';

                if(fences.length === 0) {
                    list.innerHTML = '<li style="text-align:center; padding:2rem; color:#6b7280;">No zones created yet.</li>';
                }

                fences.forEach(f => {
                    // Add to Map
                    if(f.geometry) {
                        draw.add({
                            id: f._id,
                            type: 'Feature',
                            properties: {},
                            geometry: f.geometry
                        });
                    }
                    // Add to List
                    addToList(f.description, f.metadata?.riskLevel, f.metadata?.place, f._id, f.externalId);
                });
            } catch (e) { console.error("Fetch error:", e); }
        }

        function addToList(name, risk, place, id, extId) {
            const list = document.getElementById('zone-list');
            const li = document.createElement('li');
            li.className = 'zone-item';
            const badgeClass = `badge-${risk || 'restricted'}`;
            
            li.innerHTML = `
                <div>
                    <h3>${name}</h3>
                    <span class="zone-loc"><i class="fa-solid fa-location-dot"></i> ${place || 'Unknown'}</span>
                    <span class="badge ${badgeClass}">${risk || 'restricted'}</span>
                </div>
                <button class="del-btn" onclick="deleteZone(this, '${extId}', '${id}')"><i class="fa-solid fa-trash"></i></button>
            `;
            list.appendChild(li);
        }

        map.on('load', loadZones);

        // --- DRAW & SAVE LOGIC ---
        function openModal() { document.getElementById('zone-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('zone-modal').style.display = 'none'; }

        function startDrawing() {
            const name = document.getElementById('zone-name').value;
            if(!name) return alert("Enter a name");
            closeModal();
            draw.changeMode('draw_polygon');
        }

        map.on('draw.create', async (e) => {
            const feature = e.features[0];
            const name = document.getElementById('zone-name').value;
            const place = document.getElementById('zone-place').value;
            const risk = document.getElementById('zone-risk').value;
            const extId = 'zone-' + Date.now();

            const body = {
                description: name,
                tag: 'safety-zone',
                externalId: extId,
                type: 'polygon',
                coordinates: feature.geometry.coordinates[0],
                metadata: { riskLevel: risk, place: place }
            };

            const res = await fetch(`https://api.radar.io/v1/geofences/safety-zone/${extId}`, {
                method: 'PUT',
                headers: { 'Authorization': RADAR_SK, 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            if(res.ok) {
                const data = await res.json();
                addToList(name, risk, place, data.geofence._id, extId);
            } else {
                alert("Failed to save geofence to Radar.");
                draw.delete(feature.id);
            }
        });

        window.deleteZone = async (btn, extId, mapId) => {
            if(!confirm("Delete this zone?")) return;
            const res = await fetch(`https://api.radar.io/v1/geofences/safety-zone/${extId}`, {
                method: 'DELETE',
                headers: { 'Authorization': RADAR_SK }
            });
            if(res.ok) {
                btn.closest('li').remove();
                draw.delete(mapId);
            }
        };
    </script>
</body>
</html>
